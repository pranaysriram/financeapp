<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="/static/style.css">
<title>Add Transaction</title>
</head>

<body>

<div class="container">
  <div class="add-transaction-wrapper">
    <h1>Add New Transaction</h1>
    
    <div class="nav-buttons">
      <a href="/" class="btn btn-secondary">Back to Home</a>
      <a href="/transactions" class="btn btn-secondary">View Transactions</a>
    </div>

    <form method="post" class="transaction-form">
      <div class="form-section">
        <h2>Transaction Details</h2>

        <div class="form-group form-row">
          <div class="form-col">
            <label for="amount">Amount *</label>
            <div class="input-wrapper">
              <span class="input-prefix">$</span>
              <input type="number" id="amount" name="amount" placeholder="0.00" step="0.01" required>
            </div>
          </div>

          <div class="form-col">
            <label for="type">Type *</label>
            <select id="type" name="type" required>
              <option value="">Select Type</option>
              <option value="income">Income</option>
              <option value="expense">Expense</option>
            </select>
          </div>
        </div>

        <div class="form-group form-row">
          <div class="form-col">
            <label for="category">Category *</label>
            <input type="text" id="category" name="category" placeholder="e.g., Salary, Groceries" required>
          </div>

          <div class="form-col">
            <label for="date">Date *</label>
            <input type="date" id="date" name="date" required>
          </div>
        </div>

        <div class="form-group">
          <label for="note">Note (Optional)</label>
          <textarea id="note" name="note" placeholder="Add any notes about this transaction..." rows="3"></textarea>
        </div>
      </div>

      <div class="form-actions">
        <button type="submit" class="btn btn-primary">Add Transaction</button>
        <a href="/transactions" class="btn btn-secondary">Cancel</a>
      </div>
    </form>
  </div>
</div>

</body>
</html>
