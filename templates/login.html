<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="/static/style.css">
<title>Login</title>
</head>

<body class="login-body">

<!-- Header -->
<header class="login-header">
  <div class="logo">FINANCE APP</div>
  <div class="header-buttons">
    <a href="/register" class="signup-btn">Sign up</a>
    <a href="#" class="login-btn-header">Login</a>
  </div>
</header>

<!-- Login Container -->
<div class="login-container">
  <div class="login-box">
    <h1 class="login-heading">Log in to your account</h1>
    
    <!-- Google Login Button -->
    <button class="google-btn">
      <svg width="20" height="20" viewBox="0 0 24 24" style="margin-right: 10px;">
        <text x="2" y="18" font-size="16">G</text>
      </svg>
      Continue with Google
    </button>
    
    <!-- OR Separator -->
    <div class="or-separator">
      <span>OR</span>
    </div>
    
    <!-- Login Form -->
    <form method="post" class="login-form">
      <div class="form-group">
        <input type="text" name="username" placeholder="Username or Email" class="form-input" required>
      </div>
      
      <div class="form-group">
        <div class="password-container">
          <input type="password" name="password" placeholder="Password" class="form-input" id="password-input" required>
          <button type="button" class="toggle-password" onclick="togglePassword()">👁️</button>
        </div>
      </div>
      
      <button type="submit" class="login-button">LOGIN</button>
    </form>
    
    <!-- Forgot Password -->
    <a href="#" class="forgot-password">Forgot Password?</a>
    
    <!-- Help Footer -->
    <div class="help-footer">
      If something is not right, email us at <a href="mailto:help@financeapp.com" class="help-email">help@financeapp.com</a>
    </div>
  </div>
</div>

<script>
function togglePassword() {
  const input = document.getElementById('password-input');
  if (input.type === 'password') {
    input.type = 'text';
  } else {
    input.type = 'password';
  }
}
</script>

</body>
</html>
